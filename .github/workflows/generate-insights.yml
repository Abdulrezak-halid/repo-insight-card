name: Generate GitHub Insights

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate profile card and analytics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run tests
        run: npm test

      - name: Generate GitHub insight artifacts
        run: npm run generate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          LOG_LEVEL: info

      - name: Show generated changes
        run: |
          git status --short
          test -f dist/profile-card.svg
          test -f dist/insights.json
          grep -q "This section is generated by" README.md

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md dist/insights.json dist/profile-card.svg
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update generated GitHub insights"
            git push
          fi
